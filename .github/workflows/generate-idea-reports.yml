---
name: Generate IDEA Reports

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 0 * * 2"
  workflow_dispatch:

jobs:
  bundle:
    name: Generate IDEA Reports
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install -r ./requirements.txt
      - run: python ./main.py generate-idea-report
      - run: python ./main.py generate-idea-bureau-report
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # 7.1.0
        with:
          commit_message: Update IDEA reports
